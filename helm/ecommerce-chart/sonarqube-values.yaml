monitoringPasscode: "myStrongPasscode123"

# Edition selection
community:
  enabled: true   # ✅ This tells Helm to deploy Community Edition

# Optional extras
persistence:
  enabled: true
  size: 10Gi

service:
  type: ClusterIP
  port: 9000

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "1"

