apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-ingress"
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: nginx
  rules:
{{- range .Values.ingress.hosts }}
    - host: {{ . }}
      http:
        paths:
        {{- range $.Values.ingress.paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
        {{- end }}
{{- end }}
