global:
  namespace: default
ingress:
  hosts:
    - shop.dev.ecommerce-demo1.com
  paths:
    - path: /
      service: ecommerce-dev-productwebapp   # Service name confirmed earlier
      port: 8080
    - path: /products
      service: productservice                # Correct name from kubectl describe
      port: 8080
    - path: /customers
      service: customerservice
      port: 8080
    - path: /orders
      service: orderservice
      port: 8080
    - path: /healthz
      service: productservice
      port: 8080
