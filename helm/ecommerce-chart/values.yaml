global:
  namespace: default
ingress:
  host: dev.ecommerce.local
  paths:
    - path: /products
      service: productservice
      port: 8080
    - path: /customers
      service: customerservice
      port: 8080
    - path: /orders
      service: orderservice
      port: 8080
    - path: /healthz
      service: productservice   # or a dedicated health aggregator service
      port: 8080
