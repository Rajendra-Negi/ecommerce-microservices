global:
  namespace: default
ingress:
  hosts:
    - shop.dev.ecommerce-demo1.com
  paths:
    - path: /
      service: ecommerce-dev-productwebapp
      port: 8080
    - path: /products
      service: ecommerce-dev-productservice
      port: 8080
    - path: /customers
      service: ecommerce-dev-customerservice
      port: 8080
    - path: /orders
      service: ecommerce-dev-orderservice
      port: 8080
    - path: /healthz
      service: ecommerce-dev-productservice
      port: 8080
