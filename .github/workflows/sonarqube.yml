name: SonarQube Analysis

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  sonar-customer:
    runs-on: windows-latest   # .NET requires Windows runner
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'   # adjust to your project version

      - name: Install SonarScanner for MSBuild
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarQube Begin Analysis (CustomerService)
        run: |
          dotnet sonarscanner begin \
            /k:"CustomerService" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN_CUSTOMER }}"

      - name: Build CustomerService
        run: dotnet build CustomerService/CustomerService.csproj --no-incremental

      - name: SonarQube End Analysis (CustomerService)
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN_CUSTOMER }}"

  sonar-order:
    runs-on: ubuntu-latest   # Java service
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: SonarQube Scan (OrderService)
        run: |
          cd OrderService
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=OrderService \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_ORDER }}

  sonar-product:
    runs-on: ubuntu-latest   # Node.js service
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'   # adjust to your project version
      - name: Install SonarScanner
        run: npm install -g sonar-scanner
      - name: SonarQube Scan (ProductService)
        run: |
          cd ProductService
          sonar-scanner \
            -Dsonar.projectKey=ProductService \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_PRODUCT }}
